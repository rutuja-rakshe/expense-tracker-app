version: "3.9"

services:
  web:
    image: ${ECR_IMAGE}
    restart: always
    command: gunicorn config.wsgi:application --config gunicorn.conf.py
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - static_volume:/app/staticfiles
      - logs_volume:/app/logs
    ports:
      - "8000:8000"
    logging:
      driver: awslogs
      options:
        awslogs-group: /expense-tracker/web
        awslogs-region: us-east-1
        awslogs-stream-prefix: web

  celery:
    image: ${ECR_IMAGE}
    restart: always
    command: celery -A config.celery worker --loglevel=info --concurrency=4
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - logs_volume:/app/logs
    logging:
      driver: awslogs
      options:
        awslogs-group: /expense-tracker/celery
        awslogs-region: us-east-1
        awslogs-stream-prefix: celery

  nginx:
    image: nginx:1.25-alpine
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web

volumes:
  static_volume:
  logs_volume: